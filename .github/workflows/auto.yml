name: Auto Update 2.0

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure output directory exists
        run: mkdir -p .output

      - name: Run scraper
        run: node index.js

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain .output)" ]; then
            TIMESTAMP="$(TZ='Australia/Sydney' date '+%Y-%m-%d %H:%M:%S %Z')"
            git add -A .output
            git commit -m "Automatic update - ${TIMESTAMP}"
            git push
          else
            echo "No output changes to commit"
          fi
